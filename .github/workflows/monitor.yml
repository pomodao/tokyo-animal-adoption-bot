name: Monitor Adoption Animals

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run monitor
        id: monitor
        continue-on-error: true
        run: npm run monitor
        env:
          SOURCE_LIST_URL: https://shuyojoho.metro.tokyo.lg.jp/generals/cat
          USER_AGENT: tokyo-animal-adoption-bot/1.0 (+https://github.com/${{ github.repository }})
          BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_IDENTIFIER }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          BLUESKY_SERVICE_URL: https://bsky.social

      - name: Commit updated state
        if: ${{ always() }}
        run: |
          if git diff --quiet -- state; then
            echo "No state changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state
          git commit -m "chore: update bot state"
          git push

      - name: Fail workflow if monitor failed
        if: ${{ steps.monitor.outcome == 'failure' }}
        run: exit 1

  notify:
    runs-on: ubuntu-latest
    needs: monitor
    if: ${{ always() }}
    steps:
      - name: Create or update failure issue after consecutive failures
        if: ${{ needs.monitor.result == 'failure' }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflowId = "monitor.yml";
            const labelName = "monitor-failure";
            const threshold = 3;

            const runs = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: workflowId,
              branch: context.ref.replace("refs/heads/", ""),
              status: "completed",
              per_page: 10
            });

            let consecutiveFailures = 0;
            for (const run of runs.data.workflow_runs) {
              if (run.conclusion !== "failure") {
                break;
              }
              consecutiveFailures += 1;
            }

            core.info(`Consecutive failures: ${consecutiveFailures}`);

            if (consecutiveFailures < threshold) {
              core.info("Failure threshold not reached.");
              return;
            }

            try {
              await github.rest.issues.getLabel({ owner, repo, name: labelName });
            } catch (error) {
              await github.rest.issues.createLabel({
                owner,
                repo,
                name: labelName,
                color: "b60205",
                description: "Monitor workflow consecutive failure"
              });
            }

            const issues = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              labels: labelName,
              per_page: 100
            });

            const body = [
              "監視 workflow の失敗が連続しています。",
              "",
              `- workflow: \`${context.workflow}\``,
              `- branch: \`${context.ref.replace("refs/heads/", "")}\``,
              `- 連続失敗回数: ${consecutiveFailures}`,
              `- 最新 run: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
              "",
              "対象ページの HTML 構造変更、ネットワーク障害、SNS 投稿失敗などを確認してください。"
            ].join("\n");

            if (issues.data.length > 0) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issues.data[0].number,
                body
              });
              return;
            }

            await github.rest.issues.create({
              owner,
              repo,
              title: `Monitor workflow failure (${consecutiveFailures} consecutive runs)`,
              body,
              labels: [labelName]
            });

      - name: Close failure issue after recovery
        if: ${{ needs.monitor.result == 'success' }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const labelName = "monitor-failure";

            const issues = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              labels: labelName,
              per_page: 100
            });

            for (const issue of issues.data) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: `監視 workflow が復旧しました。最新成功 run: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`
              });

              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issue.number,
                state: "closed"
              });
            }
